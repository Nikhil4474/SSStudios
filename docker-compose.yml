services:
  app:
    build:
      context: .
      args:
        VITE_API_BASE_URL: https://ssstudios.me
        VITE_YT_CHANNEL_ID: ${VITE_YT_CHANNEL_ID:-UCXXXXXXXXXXXXXXXXXXXXXX}
    env_file:
      - backend/.env
    restart: unless-stopped
    ports:
      - "8080:4000"

