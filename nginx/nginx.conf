# Replace ssstudios.me with your real domain everywhere below.

server {
    listen 80;
    server_name ssstudios.me www.ssstudios.me;

    # Required for Let's Encrypt's HTTP-01 challenge (certbot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Once you have real certs, everything else redirects to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ssstudios.me www.ssstudios.me;

    ssl_certificate     /etc/letsencrypt/live/ssstudios.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ssstudios.me/privkey.pem;

    location / {
        proxy_pass http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── cloud.ssstudios.me / photos.ssstudios.me — Immich (self-hosted photos), ──
# ── running directly on the host at localhost:2283, not in this compose file. ──

server {
    listen 80;
    server_name cloud.ssstudios.me photos.ssstudios.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name cloud.ssstudios.me;

    ssl_certificate     /etc/letsencrypt/live/cloud.ssstudios.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.ssstudios.me/privkey.pem;

    client_max_body_size        0;
    proxy_http_version          1.1;
    proxy_request_buffering     off;
    proxy_buffering             off;
    proxy_max_temp_file_size    0;
    proxy_ignore_headers        X-Accel-Buffering;
    proxy_force_ranges          on;
    proxy_read_timeout          3600s;
    proxy_send_timeout          3600s;
    send_timeout                3600s;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_set_header Upgrade        $http_upgrade;
    proxy_set_header Connection     $http_connection;
    proxy_set_header Host           $host;
    proxy_set_header X-Real-IP      $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
        return 301 https://ssstudios.me;
    }

    location = /auth/login {
        proxy_pass http://host.docker.internal:2283;
    }

    location = /family {
        return 302 /auth/login;
    }

    location /share/ {
        proxy_pass http://host.docker.internal:2283;
    }
    location /s/ {
        proxy_pass http://host.docker.internal:2283;
    }
    location /admin/ {
        proxy_pass http://host.docker.internal:2283;
    }

    location / {
        proxy_pass http://host.docker.internal:2283;
    }
}

